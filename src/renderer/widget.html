<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'none'">
  <title>今日课表</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="widgetBackground" class="widget-background"></div>
  <main class="widget-shell">
    <header class="widget-titlebar">
      <div class="widget-brand"><img src="../../assets/icon.png" alt=""><span>今日课表</span></div>
      <div class="widget-controls">
        <button id="widgetColorMode" title="切换明亮/深色模式"><svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="moon-icon" viewBox="0 0 24 24"><path d="M20.7 15.4A9 9 0 0 1 8.6 3.3 9 9 0 1 0 20.7 15.4Z"/></svg></button>
        <button id="desktopPin" title="固定到 Windows 桌面"><svg viewBox="0 0 24 24"><path d="m9 3 6 6M8 8l8 8M14 5l5 5-3 2 1 3-2 2-3-1-2 3-5-5 3-2-1-3Z"/><path d="m9 15-5 5"/></svg></button>
        <button id="openMain" title="打开完整课表"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3M14 3h7v7M10 14 21 3"/></svg></button>
        <button id="widgetSettings" title="个性化设置"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1A7 7 0 0 0 15 6l-.3-2.6h-4L10.4 6a7 7 0 0 0-1.6.9l-2.4-1-2 3.5 2 1.5a7 7 0 0 0 0 2.1l-2 1.5 2 3.4 2.4-1A7 7 0 0 0 10.4 18l.3 2.6h4L15 18a7 7 0 0 0 1.6-.9l2.4 1 2-3.5-2-1.5a7 7 0 0 0 0-1.1Z"/></svg></button>
        <button id="closeWidget" class="close" title="关闭桌面课表"><svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg></button>
      </div>
    </header>

    <section class="today-heading">
      <div>
        <div id="liveTime" class="live-time">--:--</div>
        <div id="todayDate" class="today-date">—</div>
      </div>
      <div class="week-badge"><b id="displayWeek">第 1 周</b><span id="weekday">周一</span></div>
    </section>

    <nav class="widget-day-nav" aria-label="日期切换">
      <button id="previousDay" title="上一天"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
      <button id="backToday" class="today-button">回到今天</button>
      <button id="nextDay" title="下一天"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
    </nav>

    <section id="courseStatus" class="course-status hidden">
      <div><span id="courseStatusLabel">下一节</span><b id="courseStatusTitle">—</b></div>
      <strong id="courseStatusTime">—</strong>
      <i><span id="courseStatusProgress"></span></i>
    </section>

    <section id="courseList" class="course-list"></section>

    <section id="emptyToday" class="empty-today hidden">
      <div class="empty-orbit"><span></span></div>
      <h2 id="emptyTitle">今天没有课程</h2>
      <p id="emptyHint">放松一下，或者打开完整周课表。</p>
    </section>

    <footer class="widget-footer">
      <div class="sync-state"><i id="syncDot"></i><span id="syncState">本地课表</span></div>
      <button id="widgetSync"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 19h14"/></svg>导入</button>
    </footer>
  </main>
  <div id="widgetToast" class="widget-toast hidden"></div>
  <script src="widget-logic.js"></script>
  <script src="widget.js"></script>
</body>
</html>
