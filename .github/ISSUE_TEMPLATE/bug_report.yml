name: Bug 报告
description: 报告可以稳定复现的软件问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先确认教务网页在校园网内可以正常访问，并删除截图或日志中的学号、密码、验证码、Cookie 和成绩隐私。
  - type: input
    id: version
    attributes:
      label: 软件版本
      placeholder: 例如 v1.0.0
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: 网络环境
      options:
        - 校园网
        - 其他网络
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期望看到什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可提供已脱敏的截图或错误信息。
