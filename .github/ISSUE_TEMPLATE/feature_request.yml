name: 功能建议
description: 提议新的功能或使用体验改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么情况下需要这个功能？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 希望软件如何解决这个问题？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 是否考虑过其他实现方式？
